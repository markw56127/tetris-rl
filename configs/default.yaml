training:
  total_timesteps: 1_000_000
  n_envs: 8
  seed: 42
  checkpoint_freq: 500_000
  eval_freq: 100_000
  eval_episodes: 20
  log_dir: "runs/"
  checkpoint_dir: "checkpoints/"

ppo:
  learning_rate: 3.0e-4
  lr_schedule: "linear"       # linear decay to 0 over training
  n_steps: 2048               # steps per env per rollout
  batch_size: 256
  n_epochs: 4
  gamma: 0.99
  gae_lambda: 0.95
  clip_range: 0.2
  ent_coef: 0.05
  vf_coef: 0.5
  max_grad_norm: 0.5
  device: "mps"

network:
  features_dim: 256
