device: "mps"
seed: 42

total_steps: 150_000

# Optimizer
learning_rate: 1.0e-4
gamma: 0.99

# Replay buffer
buffer_size: 100_000
batch_size: 128
train_freq: 4             # train every N environment steps

# Target network
target_update_freq: 2_000 # hard update every N steps

# Exploration — decay fast, then train at low epsilon
epsilon_start: 1.0
epsilon_end:   0.05
epsilon_decay_steps: 75_000

# Logging / checkpointing
log_freq:        50       # print stats every N episodes
checkpoint_freq: 50_000   # save .pt every N steps
