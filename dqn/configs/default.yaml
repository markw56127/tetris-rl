device: "mps"
seed: 42

total_steps: 2_000_000

# Optimizer
learning_rate: 1.0e-4
gamma: 0.99

# Replay buffer
buffer_size: 200_000
batch_size: 128
train_freq: 4             # train every N environment steps

# Target network
target_update_freq: 2_000 # hard update every N steps

# Exploration — decay fast, then train at low epsilon for a long time
epsilon_start: 1.0
epsilon_end:   0.05
epsilon_decay_steps: 500_000   # jump happens ~450k-500k, then 5.5M steps to keep improving

# Logging / checkpointing
log_freq:        200      # print stats every N episodes
checkpoint_freq: 500_000  # save .pt every N steps
